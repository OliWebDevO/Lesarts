        - generic [ref=e74]:
          - list [ref=e76]:
            - listitem:
              - generic:
                - heading "\"THE best picture framer in London, without a doubt. Frame London consistently provide outstanding customer service and produce high-quality, imaginative framing solutions in response to a diverse range of projects. We have had only positive feedback from artists.”" [level=2]
                - generic:
                  - paragraph: — Vicky Steer, Head of Editions, Whitechapel Gallery
            - listitem:
              - generic:
                - heading [level=2]: It has truly been a delight to work with FRAME London. Harry, Vicky and the team are knowledgeable, highly skilled craftspeople, and have always taken the time to work with us on selecting the perfect frame for each project. They have executed commissions with an impressive level of attention to detail and care and have been excellent to partner with for South London Gallery's limited artist editions. I can only highly recommend them.
                - generic:
                  - paragraph: Nadia Jones
                  - paragraph:
                    - emphasis: Bookshop, Editions & Retail Manager
                    - text: ", SLG"
            - listitem:
              - generic:
                - heading [level=2]: "\"I’ve been working with FRAME for a few years now and I can’t recommend them highly enough. Their frames are always beautifully made with a keen attention to materials, detail and finish which really enhances my work. They’re also a genuinely lovely team and are always helpful, friendly and accommodating. They’ve come to my rescue on many occasions where I’ve had a complicated request or a tight window for framing. It’s a pleasure to work with them and I look forward to seeing many more of my paintings and drawings framed by FRAME.\""
                - generic:
                  - paragraph: — Caroline Walker, Artist
            - listitem:
              - generic:
                - heading [level=2]: “ The best in the business. FRAME London give the best quality service and results in the country. They always meet deadlines, can work to any spec and I trust their approach to framing entirely. Everyone who starts using them, switches and makes them their main framer. Creative, professional and incredible high quality frames.”
                - generic:
                  - paragraph: — Francesca Gavin, Writer & Curator
            - listitem:
              - generic:
                - heading [level=2]: "\"We have had the pleasure of working with FRAME London for many years, and their expertise and thoughtfulness have consistently impressed us. They are not only highly skilled framers, but their level of customer service is exceptional, always taking into consideration our needs and preferences. Every piece they frame is handled with the utmost care and precision and we highly recommend their services to anyone seeking quality professional framing.\""
                - generic:
                  - paragraph: — Antonia Seroff, Nottingham Contemporary
            - listitem:
              - generic:
                - heading [level=2]: “I use Frame because they have a lovely selection and it’s a solid, reliable product it’s a really good service, they’re always super helpful and work pretty quickly, I’ve always had very positive experiences with them and I recommend them to clients and friends alike. Their client list speaks for their reputation, they’re also really convenient for me as they’re local to my home and close to my studio."
                - generic:
                  - paragraph: — Hollie Bowden
            - listitem:
              - generic:
                - heading [level=2]: “Harry and his ebullient colleagues have always helped us consider exciting framing options which combined with their knowledge and application of conservation materials and a keen eye for design have sensitively benefitted the artists and artworks we have worked with together. They have assisted us both at short notice, on jobs that are seemingly minor, and on large, complex projects with equal vim and vigour, a testament to their own handling of logistics and project management. A visit to their workshop is the highlight of a working week!”
                - generic:
                  - paragraph: — Tim Davies, Director, GRIMM GALLERY
            - listitem:
              - generic:
                - heading [level=2]: “FRAME staff are all artists themselves so have the sensibility for working with artists. There is a broad skill set and everything they do is bespoke so it feels like any idea can be realised. They also take a great deal of time and patience to work out the right solution for a particular piece. I have often felt rushed or pushed into a particular approach at other framers that I have used. This has never been the case with FRAME London.”
                - generic:
                  - paragraph: — David Noonan, Artist
