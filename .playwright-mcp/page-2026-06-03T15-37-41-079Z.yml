    - region "L'atelier" [ref=e16]:
      - generic [ref=e17]:
        - paragraph [ref=e18]: 01 — À propos
        - heading "L'atelier" [level=1] [ref=e19]
        - generic [ref=e20]:
          - paragraph [ref=e21]: Depuis plus de 15 ans, Lesarts Production est spécialisé dans l'encadrement sur mesure. Forts de cette expérience, nous conseillons chacun de nos clients avec une attention toujours renouvelée et cela pour tout type de photos, de posters, de lithographies et d'œuvres d'art.
          - paragraph [ref=e22]: Notre métier, ce n'est pas seulement encadrer, c'est aussi exposer de nombreux artistes. Nous proposons donc une exposition permanente riche d'artistes d'horizons et de techniques fort différents.
