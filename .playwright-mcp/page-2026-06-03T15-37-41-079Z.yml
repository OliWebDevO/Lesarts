      - generic [ref=e41]:
        - generic [ref=e42]: 02 — Notre histoire
        - heading "Notre histoire" [level=2] [ref=e43]
        - generic [ref=e44]:
          - generic [ref=e45]:
            - generic [ref=e46]: "01"
            - paragraph [ref=e47]: Lesarts Production est une maison spécialisée dans l'encadrement sur mesure qui vous propose, tout au long de l'année, des expositions d'artistes de renoms.
          - generic [ref=e48]:
            - generic [ref=e49]: "02"
            - paragraph [ref=e50]: Chez Lesarts, nous vous proposons un vaste choix de cadres pour vos photos, posters et œuvres à de très bons prix. Venez découvrir notre offre en magasin et choisissez l'assemblage de vos désirs. À cette occasion, vous pourrez également voir notre exposition permanente.
          - generic [ref=e51]:
            - generic [ref=e52]: "03"
            - paragraph [ref=e53]: Chez Lesarts, nous sommes motivés par un grand souci de qualité, essentiel dans notre travail.
    - region "Nos valeurs" [ref=e54]:
      - generic [ref=e55]: 03 — Ce qui nous guide
      - separator [ref=e56]
      - heading "Nos valeurs" [level=2] [ref=e57]
      - generic [ref=e58]:
        - generic [ref=e59]:
          - generic [ref=e60]: "01"
          - heading "Authenticité" [level=3] [ref=e61]
          - paragraph [ref=e62]: Chaque cadre est unique, pensé pour l'oeuvre qu'il accueille. Nous ne travaillons pas en série — chaque réalisation est le résultat d'un dialogue entre l'objet, l'espace et vos envies.
        - generic [ref=e63]:
          - generic [ref=e64]: "02"
          - heading "Précision" [level=3] [ref=e65]
          - paragraph [ref=e66]: Un travail d'orfèvre, où le détail fait la différence. Du choix de la baguette à la découpe du passe-partout, chaque millimètre est mesuré, chaque angle vérifié. La qualité ne se voit pas — elle se ressent.
        - generic [ref=e67]:
          - generic [ref=e68]: "03"
          - heading "Conseil" [level=3] [ref=e69]
          - paragraph [ref=e70]: Nous vous accompagnons du choix de la baguette jusqu'à la pose. Notre rôle n'est pas seulement de fabriquer — c'est de vous guider pour que le résultat final dépasse vos attentes.
